$wall = $HOME/.config/hyprlock/wallpapers/1.jpg

# BACKGROUND
background {
    monitor =
    path = $wall
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Profie-Photo
image {
    monitor =
    path = ~/.config/hyprlock/wallpapers/orv2.webp
    border_size = 4
    border_color = rgba(34, 84, 150, 0.71)
    size = 230
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 400
    halign = center
    valign = center
}

# NAME
label {
    monitor =
    text = $USER
    color = rgba(216, 222, 233, 0.80)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 50
    position = 0, 230
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.80)
    font_size = 120
    position = 0, 100
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, .80)
    font_size = 38
    font_family = SF Pro Display Bold
    position = 0, -30
    halign = center
    valign = center
}

# MAin-BOX
shape {
    monitor =
    size = 1000, 1000
    color = rgba(53, 37, 47, 0.62)
    rounding = 30
    border_size = 0
    border_color = $primary_8_rgba 
    rotate = 0
    xray = false 
    position = 0, -70
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 640, 110
    color = rgba(255, 255, 255, 0.1)
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 1)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)
    position = 0, -220
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = rgba(216, 222, 233, 0.80)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 32
    position = 0, -220
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 640, 110
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    check_color = rgba(0, 255, 0, 0.6)
    fail_color = rgba(255, 0, 0, 0.6)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##ffffff99">   Enter Pass</span></i>
    hide_input = false
    position = 0, -380
    halign = center
    valign = center
}
